<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .container {
            margin-top: 50px;
        }

        .card {
            margin-bottom: 20px;
        }

        .collapse-content {
            padding-left: 20px;
        }
    </style>
</head>

<body>
{% include 'navbar.html' %}

<div class="container">
    <h1 class="text-center mb-5">Admin Dashboard</h1>

    <!-- PDF File Upload Form for New Course Content -->
    <div class="card">
        <div class="card-header">
            <h5><b>Upload PDF File for Creating New Course Content.</b></h5>
        </div>
        <div class="card-body">
            <form action="{% url 'dashboard' %}" method="post" enctype="multipart/form-data"
                  onsubmit="return validateFile()">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="courseName" class="form-label">Course Name:</label>
                    <input class="form-control" type="text" id="courseName" name="course_name" required>
                </div>
                <div class="mb-3">
                    <label for="pdfFile" class="form-label">Select PDF File:</label>
                    <input class="form-control" type="file" id="pdfFile" name="pdf_file" accept="application/pdf"
                           required>
                </div>
                <button type="submit" class="btn btn-warning">Upload</button>
            </form>
            <div id="fileError" class="text-danger mt-2"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function validateFile() {
        const pdfFile = document.getElementById('pdfFile');
        const fileError = document.getElementById('fileError');
        const submitButtons = document.querySelectorAll('button[type="submit"]');

        if (pdfFile.files.length === 0) {
            fileError.textContent = "Please select a file.";
            return false;
        }

        const file = pdfFile.files[0];
        const fileType = file.type;

        if (fileType !== 'application/pdf') {
            fileError.textContent = "Please upload a valid PDF file.";
            return false;
        }

        submitButton.disabled = true;
        fileError.textContent = "";
        return true;
    }

    function validateFileWithCourse() {
        const courseSelect = document.getElementById('existingCourse');
        const pdfFile = document.getElementById('pdfFileExisting');
        const fileError = document.getElementById('fileErrorExisting');
        const submitButton = document.querySelector('button[type="submit"]');

        if (courseSelect.value === "") {
            fileError.textContent = "Please select a course.";
            return false;
        }

        if (pdfFile.files.length === 0) {
            fileError.textContent = "Please select a file.";
            return false;
        }

        const file = pdfFile.files[0];
        const fileType = file.type;

        if (fileType !== 'application/pdf') {
            fileError.textContent = "Please upload a valid PDF file.";
            return false;
        }

        submitButtons.forEach(button => {
            button.disabled = true;
        });
        fileError.textContent = "";
        return true;
    }
</script>
</body>

</html>
