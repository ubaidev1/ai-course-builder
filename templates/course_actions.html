{% extends 'base.html' %}

{% block title %}
Admin - Course Actions
{% endblock %}

{% block content %}
<div class="container mt-5">

    <!-- Create Course Button -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4">
        <h2 class="mb-3 mb-md-0">Courses</h2>
        <div class="d-flex flex-column flex-md-row">
            <a href="{% url 'dashboard' %}" class="btn btn-primary">Create a Course</a>
        </div>
    </div>

    <div class="list-group">
        {% if courses %}
        {% for course in courses %}
        <div class="list-group-item d-flex justify-content-between align-items-center">
            {{ course.title }}
            <div class="d-flex align-items-center">
                <!-- Toggle publish switch -->
                <div class="form-check form-switch me-3">
                    <input class="form-check-input toggle-publish" type="checkbox" data-course-id="{{ course.id }}"
                           {% if course.is_published %}checked{% endif %}>
                    <label class="form-check-label">Publish</label>
                </div>

                <!-- Invite button -->
                <button class="btn btn-outline-primary invite-button" data-course-id="{{ course.id }}">Invite</button>
                <a  href="{% url 'edit_courses' %}" class="btn btn-outline-primary ms-2">Edit</a>
            </div>
        </div>

        <!-- Hidden email input form for invite -->
        <div class="list-group-item invite-form p-4 bg-light border rounded shadow-sm" id="invite-form-{{ course.id }}" style="display: none;">
            <form class="row g-3 align-items-center">
                <!-- Increase the email input field to take up more space -->
                <div class="col-md-9">
                    <input type="email" id="email-{{ course.id }}" class="form-control" placeholder="Enter email to invite" required>
                </div>
                <!-- Adjust the button column with more precise alignment -->
                <div class="col-md-3 d-flex justify-content-end">
                    <button type="button" class="btn btn-primary send-invite-button ms-auto" data-course-id="{{ course.id }}">Send Invite</button>
                </div>
            </form>
            <div class="mt-3">
                <p>Invitation link:</p>
                <div class="d-flex align-items-center">
                    <input type="text" id="invitation-link-{{ course.id }}" class="form-control me-2" readonly>
                    <button class="btn btn-outline-secondary" onclick="copyLink('{{ course.id }}')">Copy</button>
                </div>
            </div>
        </div>

        {% endfor %}
        {% else %}
        <p class="text-muted">No courses available.</p>
        {% endif %}
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.toggle-publish').forEach(function(switchElement) {
            switchElement.addEventListener('change', function() {
                const courseId = this.dataset.courseId;
                const isChecked = this.checked;
                fetch(`/toggle-course-publish/${courseId}/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': '{{ csrf_token }}',
                        'Content-Type': 'application/json'
                    }
                }).then(response => response.json())
                  .then(data => {
                      if (data.status !== 'success') {
                          alert('Failed to update the course publish status.');
                          this.checked = !isChecked;
                      }
                  }).catch(() => {
                      alert('Failed to update the course publish status.');
                      this.checked = !isChecked;
                  });
            });
        });

        document.querySelectorAll('.invite-button').forEach(function(button) {
            button.addEventListener('click', function() {
                const courseId = this.dataset.courseId;
                const inviteForm = document.getElementById('invite-form-' + courseId);
                inviteForm.style.display = (inviteForm.style.display === 'none' || inviteForm.style.display === '') ? 'block' : 'none';

                // Generate the invitation link
                fetch(`/send-invite/${courseId}/`, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': '{{ csrf_token }}',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                }).then(response => response.json())
                  .then(data => {
                      if (data.status === 'success') {
                          const inviteLink = document.getElementById('invitation-link-' + courseId);
                          inviteLink.value = data.invite_link;  // Use value instead of textContent for input
                      } else {
                          alert('Error: ' + data.message);
                      }
                  }).catch(() => {
                      alert('Failed to generate invitation link.');
                  });
            });
        });

        document.querySelectorAll('.send-invite-button').forEach(function(button) {
            button.addEventListener('click', function() {
                const courseId = this.dataset.courseId;
                const email = document.getElementById('email-' + courseId).value.trim();
                if (email) {
                    fetch(`/send-invite/${courseId}/`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': '{{ csrf_token }}',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email: email })
                    }).then(response => response.json())
                      .then(data => {
                          if (data.status === 'success') {
                              alert('Invite sent successfully!');
                              document.getElementById('invite-form-' + courseId).style.display = 'none';
                          } else {
                              alert('Error: ' + data.message);
                          }
                      }).catch(() => {
                          alert('Failed to send invite.');
                      });
                } else {
                    alert('Please enter a valid email.');
                }
            });
        });
    });

    function copyLink(courseId) {
        const inviteLinkInput = document.getElementById('invitation-link-' + courseId);
        inviteLinkInput.select();
        document.execCommand('copy');
        alert('Invitation link copied to clipboard!');
    }
</script>

<!-- Mobile responsiveness styles -->
<style>
    @media (max-width: 768px) {
        /* Make the email input field take up full width */
        .invite-form .form-control {
            width: 100%;
        }

        /* Make the send invite button take up full width and adjust alignment */
        .invite-form .send-invite-button {
            width: 100%;
            margin-top: 10px;
        }

        /* Adjust the copy button and link input field for mobile */
        .invite-form .d-flex {
            flex-direction: column;
        }

        .invite-form .form-control {
            width: 100%;
            margin-bottom: 10px;
        }

        .invite-form .btn-outline-secondary {
            width: 100%;
        }
    }
</style>
{% endblock %}
