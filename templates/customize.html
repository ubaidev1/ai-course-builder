{% extends 'base.html' %}

{% block title %}
Admin - Customize
{% endblock %}

{% block content %}
<style>
    body {
        background-color: #f8f9fa;
    }
    .sidebar {
        background-color: {% if request.customization_settings %}{{ request.customization_settings.background_color }}{% else %}white{% endif %};
        margin-top: -40px;
        margin-left:-20px;
        color: white;
        height: 100vh;
        position: fixed;
        width: 250px;
        overflow-y: auto;
    }
    .sidebar h4 {
        margin-bottom: 20px;
    }
    .sidebar a {
        color: white;
        display: flex;
        align-items: center;
        border-radius: 4px;
        transition: background-color 0.3s;
    }
    .sidebar a:hover {
        background-color: #495057;
        text-decoration: none;
        color: #f8f9fa;
    }
    .sidebar a i {
        margin-right: 10px;
    }
    .content {
        margin-left: 260px;
    }
    h2 {
        margin-bottom: 30px;
    }
    .color-picker {
        margin-bottom: 20px;
    }
    .color-preview {
        width: 50px;
        height: 25px;
        border: 1px solid #ccc;
        display: inline-block;
        margin-left: 10px;
        vertical-align: middle;
    }
    .save-button {
        margin-top: 20px;
    }
    .customization-section {
        display: none;
    }
</style>

<div class="sidebar">
    <h4>Customization</h4>
    <ul class="list-unstyled">
        <li><a href="#" class="btn btn-link" onclick="showSection('navbar-section')"><i class="fas fa-paint-brush"></i>
            Navbar Color</a></li>
        <li><a href="#" class="btn btn-link" onclick="showSection('heading-section')"><i class="fas fa-paint-brush"></i>
            Heading Color</a></li>
        <li><a href="#" class="btn btn-link" onclick="showSection('button-section')"><i class="fas fa-paint-brush"></i>
            Button Color</a></li>
        <li><a href="#" class="btn btn-link" onclick="showSection('background-section')"><i
                class="fas fa-paint-brush"></i> Sidebar Color</a></li>
        <li><a href="#" class="btn btn-link" onclick="showSection('points-section')"><i class="fas fa-paint-brush"></i>
            Points Color</a></li>
    </ul>
</div>

<div class="content">
    <h2>Customize Your Site</h2>

    <form method="POST">
        {% csrf_token %}
        <!-- Navbar Color Section -->
        <div id="navbar-section" class="customization-section">
            <div class="color-picker">
                <label for="navbar_color">Navbar Color:</label>
                <input type="color" id="navbar_color" name="navbar_color" value="{{ settings.navbar_color }}">
                <div class="color-preview" style="background-color: {{ settings.navbar_color }};"></div>
            </div>
        </div>

        <!-- Heading Color Section -->
        <div id="heading-section" class="customization-section">
            <div class="color-picker">
                <label for="heading_color">Heading Color:</label>
                <input type="color" id="heading_color" name="heading_color" value="{{ settings.heading_color }}">
                <div class="color-preview" style="background-color: {{ settings.heading_color }};"></div>
            </div>
        </div>

        <!-- Button Color Section -->
        <div id="button-section" class="customization-section">
            <div class="color-picker">
                <label for="button_color">Button Color:</label>
                <input type="color" id="button_color" name="button_color" value="{{ settings.button_color }}">
                <div class="color-preview" style="background-color: {{ settings.button_color }};"></div>
            </div>
        </div>

        <!-- Background Color Section -->
        <div id="background-section" class="customization-section">
            <div class="color-picker">
                <label for="background_color">Background Color:</label>
                <input type="color" id="background_color" name="background_color"
                       value="{{ settings.background_color }}">
                <div class="color-preview" style="background-color: {{ settings.background_color }};"></div>
            </div>
        </div>

        <!-- Points Color Section -->
        <div id="points-section" class="customization-section">
            <div class="color-picker">
                <label for="points_color">Points Color:</label>
                <input type="color" id="points_color" name="points_color" value="{{ settings.points_color }}">
                <div class="color-preview" style="background-color: {{ settings.points_color }};"></div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary save-button">Save Changes</button>
    </form>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
    function showSection(sectionId) {
        var sections = document.querySelectorAll('.customization-section');
        sections.forEach(function(section) {
            section.style.display = 'none';
        });
        document.getElementById(sectionId).style.display = 'block';
    }
    showSection('navbar-section');
</script>

{% endblock %}
