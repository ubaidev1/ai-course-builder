<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extend Course</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .container {
            margin-top: 50px;
        }

        .card {
            margin-bottom: 20px;
        }

        .modal-body {
            max-height: 70vh;
            overflow-y: auto;
        }
    </style>
</head>

<body>
{% include 'navbar.html' %}

<div class="container">
    <h1 class="text-center mb-5">Extend Course - {{ course.title }}</h1>

    <!-- PDF Upload Card -->
    <div class="card">
        <div class="card-header">
            <h5><b>Upload PDF File for Generating Content for {{ course.title }}</b></h5>
        </div>
        <div class="card-body">
            <form action="{% url 'extend_course' course.id %}" method="post" enctype="multipart/form-data" onsubmit="return validatePDFFile()">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="pdfFileExisting" class="form-label">Select PDF File:</label>
                    <input class="form-control" type="file" id="pdfFileExisting" name="pdf_file" accept="application/pdf" required>
                </div>
                <button type="submit" class="btn btn-warning">Upload</button>
            </form>
            <div id="fileErrorExisting" class="text-danger mt-2"></div>
        </div>
    </div>

    <!-- Dropdown to select module and button to add lesson -->
    <div class="card">
        <div class="card-header">
            <h5><b>Add Lesson Manually</b></h5>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label for="moduleSelect" class="form-label">Select Module:</label>
                <select class="form-control" id="moduleSelect" required>
                    <option value="">Select Module</option>
                    {% for module in course.modules.all %}
                    <option value="{{ module.id }}">{{ module.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <button class="btn btn-primary" id="addLessonButton" data-bs-toggle="modal" data-bs-target="#addLessonModal">Add Lesson</button>
        </div>
    </div>
</div>

<!-- Modal for Adding Lesson -->
<div class="modal fade" id="addLessonModal" tabindex="-1" aria-labelledby="addLessonModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addLessonModalLabel">Add Lesson and Quiz</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form action="{% url 'extend_course' course.id %}" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <input type="hidden" name="module_id" id="moduleId" value="">

                    <!-- Lesson Title -->
                    <div class="mb-3">
                        <label for="lessonTitle" class="form-label">Lesson Title:</label>
                        <input type="text" class="form-control" id="lessonTitle" name="lesson_title" required>
                    </div>

                    <!-- Lesson Content -->
                    <div class="mb-3">
                        <label for="lessonContent" class="form-label">Lesson Content:</label>
                        <textarea class="form-control" id="lessonContent" name="lesson_content" rows="5" required></textarea>
                    </div>

                    <!-- Quiz Title -->
                    <div class="mb-3">
                        <label for="quizTitle" class="form-label">Quiz Title:</label>
                        <input type="text" class="form-control" id="quizTitle" name="quiz_title" required>
                    </div>

                    <!-- Add Questions Section -->
                    <div id="questionsContainer">
                        <div class="question mb-3">
                            <label for="question1" class="form-label">Question 1:</label>
                            <textarea class="form-control" id="question1" name="questions[]" rows="2" required></textarea>

                            <!-- Options for Question 1 -->
                            <div class="mb-3">
                                <label>Options:</label>
                                <input type="text" class="form-control mb-2" name="options_question1[]" placeholder="Option 1" required>
                                <input type="text" class="form-control mb-2" name="options_question1[]" placeholder="Option 2" required>
                                <input type="text" class="form-control mb-2" name="options_question1[]" placeholder="Option 3" required>
                            </div>

                            <!-- Correct Answer for Question 1 -->
                            <div class="mb-3">
                                <label for="correctAnswer1" class="form-label">Correct Answer:</label>
                                <input type="text" class="form-control" id="correctAnswer1" name="correct_answers[]" required>
                            </div>
                        </div>
                    </div>

                    <!-- Add More Questions Button -->
                    <button type="button" class="btn btn-secondary mb-3" id="addQuestionButton">Add Another Question</button>

                    <button type="submit" class="btn btn-success">Save Lesson and Quiz</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script to handle form and dynamic question addition -->
<script>
    document.getElementById('addLessonButton').addEventListener('click', function () {
        const selectedModule = document.getElementById('moduleSelect').value;
        document.getElementById('moduleId').value = selectedModule;
    });

    let questionCount = 1;

    document.getElementById('addQuestionButton').addEventListener('click', function () {
        questionCount++;
        const questionsContainer = document.getElementById('questionsContainer');
        const newQuestionHtml = `
            <div class="question mb-3">
                <label for="question${questionCount}" class="form-label">Question ${questionCount}:</label>
                <textarea class="form-control" id="question${questionCount}" name="questions[]" rows="2" required></textarea>
                <div class="mb-3">
                    <label>Options:</label>
                    <input type="text" class="form-control mb-2" name="options_question${questionCount}[]" placeholder="Option 1" required>
                    <input type="text" class="form-control mb-2" name="options_question${questionCount}[]" placeholder="Option 2" required>
                    <input type="text" class="form-control mb-2" name="options_question${questionCount}[]" placeholder="Option 3" required>
                </div>
                <div class="mb-3">
                    <label for="correctAnswer${questionCount}" class="form-label">Correct Answer:</label>
                    <input type="text" class="form-control" id="correctAnswer${questionCount}" name="correct_answers[]" required>
                </div>
            </div>`;
        questionsContainer.insertAdjacentHTML('beforeend', newQuestionHtml);
    });
</script>

<!-- PDF validation script -->
<script>
    function validatePDFFile() {
        var fileInput = document.getElementById('pdfFileExisting');
        var filePath = fileInput.value;
        var allowedExtensions = /(\.pdf)$/i;
        var fileError = document.getElementById('fileErrorExisting');

        fileError.textContent = '';

        if (!allowedExtensions.exec(filePath)) {
            fileError.textContent = "Please upload a valid PDF file.";
            fileInput.value = '';
            return false;
        }

        var file = fileInput.files[0];
        if (file && file.type !== 'application/pdf') {
            fileError.textContent = "Please upload a valid PDF file.";
            fileInput.value = '';
            return false;
        }

        return true;
    }
</script>

</body>
</html>
